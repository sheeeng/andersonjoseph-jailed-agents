name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-formatting:
    name: Check Nix formatting
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix fmt -- --check .

  check-lint:
    name: Lint Nix code
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run statix
        run: nix shell nixpkgs#statix -c statix check

  build-and-test:
    name: Build & test (${{ matrix.package }})
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        package:
          - jailed-claude-code
          - jailed-crush
          - jailed-gemini-cli
          - jailed-hermes-agent
          - jailed-opencode
          - jailed-pi
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }}

  run-test-suite:
    name: Run test suite (env & tools)
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build env-test
        run: nix build ./tests

      - name: Test env parameter propagation
        run: |
          output=$(./result/bin/env-test -c 'echo "$MY_TEST_VAR $ANOTHER_VAR"')
          [ "$output" = "hello world" ]
        env:
          LANG: C.UTF-8

      - name: Build tools-test
        run: nix build ./tests#tools-test

      - name: Test common tools availability
        run: |
          output=$(./result/bin/tools-test -c 'echo "hello world" | sed "s/world/sed/"')
          [ "$output" = "hello sed" ]
        env:
          LANG: C.UTF-8
